<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Review</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/review.css') }}">
</head>
<body class="min-h-screen flex flex-col p-4 text-white">

    <!-- Background Canvas -->
    <canvas id="starfield" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <main class="w-full max-w-3xl mx-auto z-10 flex flex-col flex-grow">
        <h1 class="orbitron-font text-3xl md:text-4xl font-bold text-center text-orange-400 mb-2 drop-shadow-lg text-glow">Interview Analysis</h1>
        <p class="text-center text-slate-400 mb-4">Review your recorded responses. Click a question to expand the answer.</p>

        <!-- Questions Container -->
        <div id="reviewList" class="flex-grow overflow-y-auto space-y-3 mb-4 max-h-[70vh] pr-2">
            <!-- Questions & Answers will be dynamically inserted here by review.js -->
        </div>

        <!-- Footer Button -->
        <div class="text-center mt-2">
            <a href="{{ url_for('dashboard') }}" class="inline-block bg-orange-500 hover:bg-orange-600 transition-colors duration-200 font-bold py-3 px-6 rounded-lg text-lg shadow-md">
                Analysis Dashboard
            </a>
        </div>
    </main>

    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/review.js') }}"></script>

</body>
</html>
