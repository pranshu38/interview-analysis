<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Review</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/review.css') }}">
    <style>
        .score-feedback {
            margin-top: 5px;
            font-size: 0.9rem;
            color: #cbd5e1;
            background-color: #1e293b;
            padding: 5px 8px;
            border-radius: 5px;
        }
        .score-feedback span {
            display: block;
        }
        .no-feedback {
            color: #94a3b8;
            font-style: italic;
        }
        /* Footer buttons container */
        .footer-btn {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        .btn-primary, .btn-secondary {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 5px;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #28a745;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #1e7e34;
        }
    </style>
</head>
<body>

    <!-- Background Canvas -->
    <canvas id="starfield"></canvas>

    <main class="main-container">
        <h1 class="orbitron-font text-glow">Interview Analysis</h1>
        <p class="subtitle">Review your recorded responses. Click a question to expand the answer.</p>

        <!-- Questions Container -->
        <div id="reviewList" class="questions-container">
            <!-- Questions & Answers dynamically inserted here -->
        </div>

        <!-- Footer Buttons -->
        <div class="footer-btn">
            <a href="{{ url_for('dashboard') }}" class="btn-primary">Analysis Dashboard</a>
            <a href="{{ url_for('solution') }}" class="btn-secondary">Analysis Perfect Answer</a>

        </div>
    </main>

    <!-- Review JS -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const reviewList = document.getElementById("reviewList");

            // Fetch questions & answers from backend
            const res = await fetch("/get_questions");
            const data = await res.json();
            const qaLog = data.questions || [];

            if (qaLog.length === 0) {
                reviewList.innerHTML = `<p class="no-data">No interview data found.</p>`;
                return;
            }

            // Create question-answer cards
            qaLog.forEach((item, index) => {
                const card = document.createElement("div");
                card.className = "question-card";

                const questionBtn = document.createElement("button");
                questionBtn.className = "question-btn";
                questionBtn.innerHTML = `<strong>Q${index + 1}:</strong> ${item.question}`;

                const chevron = document.createElement("span");
                chevron.className = "chevron";
                chevron.innerHTML = "&#9654;"; // Right-pointing triangle
                questionBtn.appendChild(chevron);

                const answerDiv = document.createElement("div");
                answerDiv.className = "question-answer";
                answerDiv.innerText = item.answer && item.answer.trim() !== "" ? item.answer : "No answer detected.";

                // Score and Feedback
                const sfDiv = document.createElement("div");
                sfDiv.className = "score-feedback";
                const scoreText = item.score !== null ? `${item.score}%` : "N/A";
                const feedbackText = item.feedback || "N/A";
                sfDiv.innerHTML = `<span><strong>Score:</strong> ${scoreText}</span><span><strong>Feedback:</strong> ${feedbackText}</span>`;

                // Toggle answer visibility
                questionBtn.addEventListener("click", () => {
                    card.classList.toggle("active");
                });

                card.appendChild(questionBtn);
                card.appendChild(answerDiv);
                card.appendChild(sfDiv);
                reviewList.appendChild(card);
            });
        });
    </script>

</body>
</html>
