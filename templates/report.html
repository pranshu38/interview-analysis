<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.1/dist/chart.min.js"></script>
  <style>
     :root { --panel-color: rgba(255, 255, 255, 0.08); --border-color: rgba(255, 255, 255, 0.15); --text-primary: #f0f2f7; --text-secondary: #a1a8b9; --accent-cyan: #22d3ee; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #010313; color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 2rem; position: relative; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(125deg, #2337d5, #22d3ee, #a78bfa, #ef4444); background-size: 400% 400%; animation: aurora-flow 20s ease infinite; filter: blur(100px); opacity: 0.3; z-index: -1; }
    @keyframes aurora-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .report-container { width: 100%; max-width: 550px; background: var(--panel-color); border: 1px solid var(--border-color); border-radius: 16px; backdrop-filter: blur(10px); padding: 2.5rem; text-align: center; }
    .report-header h1 { font-size: 2rem; font-weight: 600; margin-bottom: 2rem; }
    .report-actions { display: flex; gap: 1rem; margin-top: 2rem;}
    .btn { flex: 1; padding: 0.8rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); background: transparent; color: var(--text-primary); font-size: 1rem; font-weight: 500; cursor: pointer; text-decoration: none; }
    .btn.primary { background: var(--accent-cyan); border-color: var(--accent-cyan); color: #010313; }
  </style>
</head>
<body>
  <div class="report-container">
    <header class="report-header">
      <h1>Your Interview Report</h1>
    </header>
    <footer class="report-actions">
      <button class="btn primary">Download PDF</button>
      <a href="/interview" class="btn">Restart Interview</a>
    </footer>
  </div>
</body>
</html>
